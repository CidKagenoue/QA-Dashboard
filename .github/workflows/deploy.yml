name: Deploy to Dev/Test

on:
  push:
    branches:
      - Build
      - main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DATABASE_URL: postgresql://postgres:${{ secrets.POSTGRES_PASSWORD }}@db:5432/qa_login_backend?schema=public
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET || secrets.JWT_SECRET }}
          JWT_ISSUER: ${{ secrets.JWT_ISSUER || 'qa-login-backend' }}
          JWT_AUDIENCE: ${{ secrets.JWT_AUDIENCE || 'qa-dashboard' }}
          JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN || '15m' }}
          JWT_REFRESH_EXPIRES_IN: ${{ secrets.JWT_REFRESH_EXPIRES_IN || '7d' }}
          FRONTEND_URL: https://tst.vlotterqa.tech
          PUBLIC_FRONTEND_URL: https://tst.vlotterqa.tech
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE || 'false' }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_IGNORE_TLS_ERRORS: ${{ secrets.SMTP_IGNORE_TLS_ERRORS || 'false' }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: POSTGRES_PASSWORD,DATABASE_URL,JWT_SECRET,JWT_REFRESH_SECRET,JWT_ISSUER,JWT_AUDIENCE,JWT_EXPIRES_IN,JWT_REFRESH_EXPIRES_IN,FRONTEND_URL,PUBLIC_FRONTEND_URL,SMTP_HOST,SMTP_PORT,SMTP_SECURE,SMTP_USER,SMTP_PASSWORD,SMTP_FROM,SMTP_IGNORE_TLS_ERRORS
          timeout: 10m
          command_timeout: 60m
          script: |
            set -euo pipefail
            cd ~/QA-Dashboard
            git fetch origin ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            docker compose -f build/docker-compose.yml down --remove-orphans || true

            # Certbot/ACME artifacts can be root-owned from prior runs; exclude them
            # from git clean so deploys do not fail on harmless permission warnings.
            git clean -fdx \
              -e build/traefik/acme \
              -e certbot \
              || true

            docker compose -f build/docker-compose.yml up -d --build --remove-orphans

            wait_for_service() {
              service_name="$1"
              container_id="$(docker compose -f build/docker-compose.yml ps -q "$service_name")"

              if [ -z "$container_id" ]; then
                echo "Missing container for $service_name"
                docker compose -f build/docker-compose.yml ps
                exit 1
              fi

              for _ in $(seq 1 60); do
                health_status="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container_id" 2>/dev/null || true)"
                if [ "$health_status" = "healthy" ] || [ "$health_status" = "running" ]; then
                  return 0
                fi
                sleep 5
              done

              echo "$service_name did not become healthy in time"
              docker compose -f build/docker-compose.yml logs --tail=100 "$service_name"
              exit 1
            }

            wait_for_service backend
            wait_for_service frontend
