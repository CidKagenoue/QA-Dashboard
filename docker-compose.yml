services:
  traefik:
    image: traefik:v2.10
    container_name: qa-traefik
    command:
      - --configfile=/etc/traefik/traefik.yml
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/acme:/letsencrypt
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/traefik-dynamic.yml:/etc/traefik/traefik-dynamic.yml:ro
    restart: unless-stopped
    networks:
      - qa_net

  db:
    image: postgres:16-alpine
    container_name: qa-db
    environment:
      POSTGRES_DB: qa_login_backend
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    volumes:
      - qa_db_data:/var/lib/postgresql/data
    # Veilig: niet publishen naar buiten. Alleen containers kunnen erbij.
    # Als je toch vanaf host wil connecten, uncomment dan de volgende 2 lijnen:
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d qa_login_backend"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - qa_net

  backend:
    build:
      context: ./qa-login-backend
      dockerfile: Dockerfile
    container_name: qa-login-backend
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./qa-login-backend/.env
    environment:
      # OVERRIDE voor Docker: localhost werkt niet in containers.
      DATABASE_URL: postgresql://postgres:root@db:5432/qa_login_backend
    restart: unless-stopped
    networks:
      - qa_net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: qa-frontend
    environment:
      ENABLE_HTTPS: "false"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - qa_net


volumes:
  qa_db_data:


networks:
  qa_net:
    driver: bridge