services:
  db:
    image: postgres:16-alpine
    container_name: qa-db
    environment:
      POSTGRES_DB: qa_login_backend
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    volumes:
      - qa_db_data:/var/lib/postgresql/data
    # Veilig: niet publishen naar buiten. Alleen containers kunnen erbij.
    # Als je toch vanaf host wil connecten, uncomment dan de volgende 2 lijnen:
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d qa_login_backend"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - qa_net

  backend:
    build:
      context: ./qa-login-backend
      dockerfile: Dockerfile
    container_name: qa-login-backend
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./qa-login-backend/.env
    environment:
      # OVERRIDE voor Docker: localhost werkt niet in containers.
      DATABASE_URL: postgresql://postgres:root@db:5432/qa_login_backend
    ports:
      - "3001:3001"
    networks:
      - qa_net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: qa-frontend
    ports:
      - "80:80"
      - "443:443"
    environment:
      ENABLE_HTTPS: "true"
    depends_on:
      - backend
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - qa_net


volumes:
  qa_db_data:


networks:
  qa_net:
    driver: bridge