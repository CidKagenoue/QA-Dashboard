server {
    listen 80;
    server_name tst.vlotterqa.tech www.tst.vlotterqa.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name tst.vlotterqa.tech www.tst.vlotterqa.tech;

    ssl_certificate     /etc/letsencrypt/live/tst.vlotterqa.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tst.vlotterqa.tech/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/wasm image/svg+xml;

    location ~ ^/(auth|users|departments|branches|locations|ova|accounts|jap|gpp|domain|executor|notifications|notification-settings)(/|$) {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization';
            add_header 'Access-Control-Max-Age' 1728000;
            return 204;
        }

        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization';
    }

    location = /index.html {
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    location /assets {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /flutter_service_worker.js {
        add_header Cache-Control "max-age=0";
    }

    location = /manifest.json {
        add_header Cache-Control "max-age=3600";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}