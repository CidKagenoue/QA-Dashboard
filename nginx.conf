server {
    listen 80;
    server_name vlotterqa.tech www.vlotterqa.tech;

    # ACME challenge endpoint for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json;

    # Proxy API requests to the backend service
    location ~ ^/(auth|users|departments|branches|locations|ova|accounts)(/|$) {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Handle CORS
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization';
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # Cache busting for index.html
    location = /index.html {
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # Cache static assets
    location /assets {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Service worker
    location = /flutter_service_worker.js {
        add_header Cache-Control "max-age=0";
    }

    # Manifest
    location = /manifest.json {
        add_header Cache-Control "max-age=3600";
    }

    # Route all other requests to index.html (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
