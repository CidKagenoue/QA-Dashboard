server {
    listen 80;
    server_name vlotterqa.tech www.vlotterqa.tech;

    # ACME challenge endpoint for Let's Encrypt renewals
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name vlotterqa.tech www.vlotterqa.tech;

    ssl_certificate /etc/letsencrypt/live/vlotterqa.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vlotterqa.tech/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json;

    location ~ ^/(auth|users|departments|branches|locations|ova|accounts)(/|$) {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization';

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    location = /index.html {
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    location /assets {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /flutter_service_worker.js {
        add_header Cache-Control "max-age=0";
    }

    location = /manifest.json {
        add_header Cache-Control "max-age=3600";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
